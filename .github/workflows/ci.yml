name: 42sh CI

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: "git@github.com:EpitechPGE1-2025/G-PSU-200-NCE-2-1-42sh-3.git"
  EXECUTABLES: "42sh"

jobs:
  check_compilation_and_coding_style:
    runs-on: ubuntu-latest
    if: github.repository != 'EpitechPGE1-2025/G-PSU-200-NCE-2-1-42sh-3'
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check coding style
        run: |
          banana-check-repo
          if [ -s coding-style-reports.log ]; then
            while read -r line; do
              FILE=$(echo "$line" | cut -d':' -f1)
              LINE=$(echo "$line" | cut -d':' -f2)
              LEVEL=$(echo "$line" | cut -d':' -f3 | xargs)
              ERROR=$(echo "$line" | cut -d':' -f4)
              echo "::error file=$FILE,line=$LINE::${LEVEL} coding style error: $ERROR"
            done < coding-style-reports.log
            exit 1
          fi

      - name: Build project
        run: make
        timeout-minutes: 2

      - name: Clean project
        run: make clean

      - name: Check executables
        run: |
          for EXEC in $(echo "$EXECUTABLES" | tr ',' ' '); do
            if [ ! -f "$EXEC" ] || [ ! -x "$EXEC" ]; then
              echo "::error file=$EXEC::Executable $EXEC not found or not executable"
              exit 1
            fi
          done

  run_tests:
    runs-on: ubuntu-latest
    needs: check_compilation_and_coding_style
    if: github.repository != 'EpitechPGE1-2025/G-PSU-200-NCE-2-1-42sh-3'
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    runs-on: ubuntu-latest
    needs: run_tests
    if: github.event_name == 'push' && github.repository != 'EpitechPGE1-2025/G-PSU-200-NCE-2-1-42sh-3'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}